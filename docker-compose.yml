version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: swiip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swiip
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO S3-Compatible Storage
  minio:
    image: minio/minio
    container_name: swiip-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO Bucket Initialization
  minio-init:
    image: minio/mc
    container_name: swiip-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set myminio http://minio:9000 admin admin123; mc mb myminio/swiip-photos --ignore-existing; mc anonymous set download myminio/swiip-photos; echo 'Bucket swiip-photos created and configured!'; exit 0; "

  # Backend Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swiip-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Server
      PORT: 4000
      NODE_ENV: development

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/swiip

      # MinIO / S3
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: swiip-photos
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: admin123
      S3_PUBLIC_URL: http://localhost:9000/swiip-photos

      # AI Configuration (override in .env file or environment)
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}

      # Limits
      AI_DAILY_FREE_LIMIT: ${AI_DAILY_FREE_LIMIT:-10}
      LIKE_DAILY_FREE_LIMIT: ${LIKE_DAILY_FREE_LIMIT:-15}
      LIKE_REWARD_AMOUNT: ${LIKE_REWARD_AMOUNT:-3}
      LIKE_MAX_REWARDS_PER_DAY: ${LIKE_MAX_REWARDS_PER_DAY:-5}

      # Admin
      ADMIN_KEY: ${ADMIN_KEY:-dev_admin_key}

      # RevenueCat (optional in dev)
      REVENUECAT_WEBHOOK_SECRET: ${REVENUECAT_WEBHOOK_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:4000}
    ports:
      - "4000:4000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres-data:
  minio-data:
